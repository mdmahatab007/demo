<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Us — EcoSocial Development Alliance</title>
  <meta name="description" content="Learn about EcoSocial Development Alliance — our mission, vision, values, and the team driving change for a sustainable future.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    .about-intro {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 64px;
      align-items: start;
      margin-bottom: 72px;
    }

    .about-text p {
      font-size: 1.02rem;
      line-height: 1.85;
      color: var(--text);
      margin-bottom: 18px;
    }

    .about-visual {
      position: sticky;
      top: 90px;
    }

    .about-card {
      background: linear-gradient(135deg, var(--green-deep), var(--blue-ocean));
      border-radius: 24px;
      padding: 36px;
      color: white;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }

    .about-card-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .about-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      margin-bottom: 12px;
    }

    .about-card p {
      color: rgba(255,255,255,0.8);
      font-size: 0.92rem;
      line-height: 1.7;
    }

    /* MISSION VISION */
    .mv-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      margin-bottom: 72px;
    }

    .mv-card {
      background: white;
      border-radius: var(--radius);
      padding: 36px;
      box-shadow: var(--shadow);
      border-left: 5px solid var(--green-mid);
    }

    .mv-card.vision { border-left-color: var(--blue-mid); }

    .mv-card-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--green-mid);
      margin-bottom: 12px;
    }

    .mv-card.vision .mv-card-label { color: var(--blue-mid); }

    .mv-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 14px;
      color: var(--dark);
    }

    .mv-card p {
      color: var(--text);
      line-height: 1.75;
      font-size: 0.97rem;
    }

    /* VALUES */
    .values-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
      margin-bottom: 72px;
    }

    .value-card {
      background: white;
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: var(--shadow);
      text-align: center;
      transition: all 0.3s;
    }

    .value-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .value-icon {
      font-size: 2.4rem;
      margin-bottom: 16px;
    }

    .value-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .value-desc {
      font-size: 0.87rem;
      color: var(--text-light);
      line-height: 1.6;
    }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 72px;
    }

    .stat-card {
      background: linear-gradient(135deg, var(--green-pale), #e0f7e9);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      border: 1px solid rgba(46,139,87,0.15);
    }

    .stat-card-number {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--green-deep);
    }

    .stat-card-label {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: 6px;
      font-weight: 500;
    }

    /* FOUNDER SECTION */
    .founder-section {
      background: white;
      border-radius: 24px;
      padding: 52px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 48px;
      align-items: center;
      margin-bottom: 72px;
    }

    .founder-img-wrap {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      overflow: hidden;
      border: 5px solid var(--green-pale);
      background: linear-gradient(135deg, var(--green-pale), var(--blue-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      flex-shrink: 0;
    }

    .founder-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

    .founder-info .badge {
      display: inline-block;
      background: var(--green-pale);
      color: var(--green-deep);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 50px;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .founder-info h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .founder-info .role {
      color: var(--green-mid);
      font-weight: 600;
      margin-bottom: 20px;
    }

    .founder-info p {
      color: var(--text);
      line-height: 1.8;
      font-size: 0.97rem;
    }

    @media (max-width: 900px) {
      .about-intro { grid-template-columns: 1fr; }
      .about-visual { position: static; }
      .mv-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .founder-section { grid-template-columns: 1fr; text-align: center; }
      .founder-img-wrap { margin: 0 auto; }
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="page-hero">
    <h1>About Us</h1>
    <p>Our story, mission, and the people making it happen</p>
  </div>

  <div class="section">
    <!-- INTRO -->
    <div class="about-intro" id="about-intro">
      <div class="about-text" id="about-content"></div>
      <div class="about-visual">
        <div class="about-card">
          <div class="about-card-icon">🌿</div>
          <h3 id="about-card-name">EcoSocial Development Alliance</h3>
          <p id="about-card-tagline">Growing Nature, Empowering People</p>
        </div>
      </div>
    </div>

    <!-- MISSION & VISION -->
    <div class="section-title">Our Mission & Vision</div>
    <div class="divider"></div>
    <div class="mv-grid" id="mv-grid"></div>

    <!-- VALUES -->
    <div class="section-title">Our Core Values</div>
    <div class="divider"></div>
    <div class="values-grid" id="values-grid"></div>

    <!-- STATS -->
    <div class="section-title">Our Impact in Numbers</div>
    <div class="divider"></div>
    <div class="stats-grid" id="stats-grid"></div>

    <!-- FOUNDER -->
    <div class="section-title" id="team-title">Our Leadership</div>
    <div class="divider"></div>
    <div class="founder-section" id="founder-section"></div>
  </div>

  <div id="footer-placeholder"></div>
  <div id="contact-fab-placeholder"></div>

  <script src="data.js"></script>
  <script>
    document.getElementById('nav-placeholder').innerHTML = renderNav('about');
    document.getElementById('footer-placeholder').innerHTML = renderFooter();
    document.getElementById('contact-fab-placeholder').innerHTML = renderContactFAB();

    const data = getSiteData();
    const au = data.aboutUs;
    const si = data.siteInfo;

    // About content
    document.getElementById('about-card-tagline').textContent = si.tagline;
    document.getElementById('about-content').innerHTML = `
      <div class="section-title">${au.title}</div>
      <div class="divider"></div>
      ${au.content.split('\n\n').map(p => `<p>${p.trim()}</p>`).join('')}
    `;

    // Mission/Vision
    document.getElementById('mv-grid').innerHTML = `
      <div class="mv-card">
        <div class="mv-card-label">🎯 Our Mission</div>
        <h3>What We Do</h3>
        <p>${au.mission}</p>
      </div>
      <div class="mv-card vision">
        <div class="mv-card-label">🌟 Our Vision</div>
        <h3>What We Strive For</h3>
        <p>${au.vision}</p>
      </div>
    `;

    // Values
    document.getElementById('values-grid').innerHTML = au.values.map(v => `
      <div class="value-card">
        <div class="value-icon">${v.icon}</div>
        <div class="value-title">${v.title}</div>
        <div class="value-desc">${v.desc}</div>
      </div>
    `).join('');

    // Stats
    document.getElementById('stats-grid').innerHTML = au.stats.map(s => `
      <div class="stat-card">
        <div class="stat-card-number">${s.number}</div>
        <div class="stat-card-label">${s.label}</div>
      </div>
    `).join('');

    // Team
    document.getElementById('team-title').textContent = au.teamTitle;
    const founder = data.members.find(m => m.featured) || data.members[0];
    document.getElementById('founder-section').innerHTML = `
      <div class="founder-img-wrap">
        ${founder && founder.image
          ? `<img src="${founder.image}" alt="${au.founderName}">`
          : '🌿'}
      </div>
      <div class="founder-info">
        <span class="badge">Founder</span>
        <h3>${au.founderName}</h3>
        <div class="role">${au.founderRole}</div>
        <p>${au.founderBio}</p>
      </div>
    `;
  </script>
</body>
</html>
